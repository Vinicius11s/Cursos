<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diretivas: v-model</title>
</head>

<body>
    <div id="directives">
        <h3 v-bind:style=" { fontSize:20px }">Hcode Treinamentos</h3>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6"></script>
    <script>

        let app = new Vue({
            el: "#directives",
            data: {
                textSize: 10
            }
        })

    </script>

</body>

</html>
