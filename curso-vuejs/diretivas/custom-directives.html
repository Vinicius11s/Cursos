<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diretivas Personalizadas</title>
</head>

<body>
    <div id="directives">
        <h4 v-upper> {{ name }} </h4>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6"></script>
    <script>
        Vue.directive('upper', {
            inserted(el) {
                el.innerText = el.innerText.toUpperCase();
            }
        })

        let app = new Vue({
            el: "#directives",
            data: {
                name: 'Hcode'
            }
        })
    </script>

</body>

</html>
